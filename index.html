<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title> TODO List</title>
        
    </head>
    <body>
        <h1>✅ TODO List</h1>
        <div class="card">
            <div class="row">
                <input id="todoInput" class="input" placeholder="Enter a task, then press the enter key / click add." />
                <!-- placeholder是占位符在用户输入前显示灰色提示文字 -->
                <input id="dueDateInput" class="input" type="date" />
                <!-- type=data会渲染为浏览器自带的日期选择器 -->
                <!-- <input>是一个空元素（没有结束标签，它根据type属性的值呈现为不同的控件 -->
                <button id="addBtn" class="btn">
                    add
                </button>
            </div>

            <div class="tabs">
                <button id="allViewBtn" class="btn">all tasks</button>
                <button id="dateViewBtn" class="btn ghost">by date</button>
            </div>

            <div class="notify-bar">
                <!-- 此界面用于开启通知 -->
                <label class="notify-option">
                    <input id="enableBrowserNotify" type="checkbox" />
                    <span>open browser notice</span>
                </label>

                <button id="requestNotifyPermissionBtn" class="btn ghost" type="button">
                    Apply for notification permission
                </button>

                <span id="notifyStatusText" class="notify-status">The notification permission was not checked.</span>
            </div>

            <div class="meta">
                <span id="countText">
                    <!-- span可以理解为是行内文本容器,div是块级容器 -->
                    0 items
                </span>
                <button id="clearCompletedBtn" class="btn ghost">
                    cleared!
                </button>
            </div>

            <ul id="todoList" class="list"></ul>
            <!-- ul是ubordered list无序列表的缩写，列表中的每个项目用li标签表示 -->
            <!-- 初始HTML只有一个空容器，JS会在这里动态添加.item -->
        </div>

        <div id="reminderModal" class="modal hidden">
            <!-- 外层div是模态框容器，初始状态位hidden类，内部modal-panel是弹窗主体 -->
            <div class="modal-panel">
                <h2>Reminder!</h2>
                <ul id="reminderList" class="reminder-list"></ul>
                <div class="modal-actions">
                  <button id="reminderCloseBtn" class="btn">Got it</button>
                </div>
            </div>
        </div>

        <div id="toast" class="toast hidden"></div>
        <!-- 定义一个轻量级的临时通知，toast提示 -->

        <script type="module" src="/src/main.js"></script>
    </body>
</html>
